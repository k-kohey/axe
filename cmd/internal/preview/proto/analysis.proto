syntax = "proto3";
package axe.analysis;
option go_package = "github.com/k-kohey/axe/internal/preview/analysisproto";

// --- axe-parser output (replaces Codable/JSON encoding) ---

enum TypeKind {
  TYPE_KIND_UNKNOWN = 0;
  TYPE_KIND_STRUCT = 1;
  TYPE_KIND_CLASS = 2;
  TYPE_KIND_ENUM = 3;
  TYPE_KIND_ACTOR = 4;
}

message PropertyInfo {
  string name = 1;
  string type_expr = 2;
  int32 body_line = 3;
  string source = 4;
}

message MethodInfo {
  string name = 1;
  string selector = 2;
  string signature = 3;
  int32 body_line = 4;
  string source = 5;
}

message TypeInfo {
  string name = 1;
  TypeKind kind = 2;
  string access_level = 3;
  repeated string inherited_types = 4;
  repeated PropertyInfo properties = 5;
  repeated MethodInfo methods = 6;
}

message PreviewBlock {
  int32 start_line = 1;
  string title = 2;
  string source = 3;
}

enum MemberSourceKind {
  MEMBER_SOURCE_KIND_UNKNOWN = 0;
  MEMBER_SOURCE_KIND_PROPERTY = 1;
  MEMBER_SOURCE_KIND_METHOD = 2;
}

message MemberSource {
  string type_name = 1;
  int32 line = 2;
  MemberSourceKind kind = 3;
  string name = 4;
  string type_expr = 5;
  string signature = 6;
  string selector = 7;
  int32 body_line = 8;
  string source = 9;
}

message ParseResult {
  reserved 1, 5, 6;  // removed: types, referenced_types, defined_types
  repeated string imports = 2;
  repeated PreviewBlock previews = 3;
  string skeleton_hash = 4;
  repeated MemberSource member_sources = 7;
}

// --- axe-index-reader output ---

message TypeFileMap {
  map<string, string> types = 1;  // typeName → filePath
}

// --- axe-index-reader rich output (Index Store) ---

enum MemberKind {
  MEMBER_KIND_UNKNOWN = 0;
  MEMBER_KIND_INSTANCE_PROPERTY = 1;
  MEMBER_KIND_INSTANCE_METHOD = 2;
  MEMBER_KIND_STATIC_PROPERTY = 3;
  MEMBER_KIND_STATIC_METHOD = 4;
  MEMBER_KIND_CONSTRUCTOR = 5;
}

message IndexMemberInfo {
  string name = 1;           // "body", "greet(name:)"
  MemberKind kind = 2;
  string access_level = 3;   // "private", "internal", "public", etc.
  int32 line = 4;
  int32 column = 5;
  bool is_computed = 6;      // accessor occurrence の有無で判定
}

message IndexTypeInfo {
  string name = 1;              // ネスト型は "Outer.Inner"
  TypeKind kind = 2;            // 既存の TypeKind enum を再利用
  string access_level = 3;
  repeated string inherited_types = 4;
  repeated IndexMemberInfo members = 5;
  int32 line = 6;
  int32 column = 7;
}

message IndexFileData {
  string file_path = 1;
  repeated IndexTypeInfo types = 2;
  repeated string referenced_type_names = 3;
  repeated string defined_type_names = 4;
}

message IndexStoreResult {
  repeated IndexFileData files = 1;
  map<string, string> type_file_map = 2;
}
